components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    NumericIdPath:
      name: id
      in: path
      required: true
      schema: { type: integer }
    UuidPath:
      name: uuid
      in: path
      required: true
      schema: { type: string, format: uuid }
    SlugPath:
      name: slug
      in: path
      required: true
      schema: { type: string }
    CourseKeyPath:
      name: key
      in: path
      required: true
      schema: { type: string }
    CourseRunKeyPath:
      name: key
      in: path
      required: true
      schema: { type: string }
    SearchQuery:
      name: q
      in: query
      schema: { type: string }
      description: Elasticsearch query string or typeahead query, depending on endpoint.
    EditableQuery:
      name: editable
      in: query
      schema: { type: boolean }
    PageQuery:
      name: page
      in: query
      schema: { type: integer, minimum: 1 }
    PageSizeQuery:
      name: page_size
      in: query
      schema: { type: integer, minimum: 1 }
    UsernameQuery:
      name: username
      in: query
      schema: { type: string }
    CourseIdQuery:
      name: course_id
      in: query
      schema: { type: string }
    CourseRunIdQuery:
      name: course_run_id
      in: query
      schema: { type: string }
    LanguageCodeQuery:
      name: language_code
      in: query
      schema: { type: string }
  requestBodies:
    GenericObjectBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/GenericObject'
  responses:
    GenericObject:
      description: JSON object response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/GenericObject'
    GenericArray:
      description: JSON array response.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '#/components/schemas/GenericObjectOrScalar'
    GenericList:
      description: Paginated or unpaginated list response.
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/PaginatedResult'
              - type: array
                items:
                  $ref: '#/components/schemas/GenericObject'
    GenericListOrArray:
      description: List response, or flat UUID array for uuids_only behavior.
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/PaginatedResult'
              - type: array
                items:
                  oneOf:
                    - type: string
                    - $ref: '#/components/schemas/GenericObject'
    SearchResults:
      description: Elasticsearch-backed search results.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PaginatedResult'
    ContainsMap:
      description: Boolean membership map keyed by requested identifiers.
      content:
        application/json:
          schema:
            type: object
            additionalProperties:
              oneOf:
                - type: boolean
                - type: object
                  additionalProperties:
                    type: boolean
    TextResponse:
      description: Plain text response.
      content:
        text/plain:
          schema: { type: string }
        application/json:
          schema: { type: string }
    BadRequest:
      description: Bad request.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Forbidden:
      description: Forbidden.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Not found.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    MethodNotAllowed:
      description: Method not allowed.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
  schemas:
    GenericObject:
      type: object
      additionalProperties: true
    GenericObjectOrScalar:
      oneOf:
        - $ref: '#/components/schemas/GenericObject'
        - type: string
        - type: number
        - type: boolean
    PaginatedResult:
      type: object
      properties:
        count:
          type: integer
        next:
          type: string
          nullable: true
        previous:
          type: string
          nullable: true
        results:
          type: array
          items:
            $ref: '#/components/schemas/GenericObject'
      additionalProperties: true
    Error:
      oneOf:
        - type: object
          additionalProperties: true
        - type: string